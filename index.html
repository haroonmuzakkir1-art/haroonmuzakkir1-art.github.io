<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hifz AI Pro - Complete Edition</title>
    <style>
        /* PRO UI DESIGN */
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --primary: #10b981;
            --text-main: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444;
            --warning: #facc15; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; background: var(--bg-dark); display: flex; flex-direction: column; height: 100vh; }
        
        /* Headers & Nav */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); background: var(--bg-card); position: sticky; top: 0; z-index: 10; }
        .header h1 { font-size: 20px; color: var(--primary); }
        .nav-tabs { display: flex; background: var(--bg-card); margin: 15px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; background: transparent; color: var(--text-muted); border: none; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        /* Views */
        .view { display: none; flex: 1; padding: 15px; overflow-y: auto; }
        .view.active { display: block; }
        
        /* Search & Lists */
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: white; margin-bottom: 15px; }
        .list-item { background: var(--bg-card); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; border: 1px solid var(--border); }
        .arabic-name { font-size: 20px; color: var(--primary); font-family: 'Traditional Arabic', serif; }
        
        /* Recitation Board */
        .quran-board { background: #022c22; border: 1px solid #065f46; border-radius: 12px; padding: 20px; direction: rtl; text-align: right; font-size: 28px; line-height: 1.8; font-family: 'Traditional Arabic', serif; margin-bottom: 15px; }
        .word { display: inline-block; margin: 0 4px; color: var(--text-main); transition: 0.2s; padding: 2px 5px; border-radius: 4px; }
        .word.highlight { color: var(--bg-dark); background: var(--warning); font-weight: bold; }
        .word.correct { color: #4ade80; }
        .word.wrong { color: var(--danger); border-bottom: 2px dashed var(--danger); }
        
        /* Controls & Status */
        .controls { display: flex; gap: 10px; flex-direction: column; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: white; text-align: center; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .status-box { background: var(--bg-card); padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; border: 1px solid var(--border); margin-bottom: 15px; }
        
        /* Stats Box */
        .stats-box { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .mistake-log { font-size: 13px; color: var(--danger); margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>Hifz AI Pro 📖</h1></div>

    <div id="view-explorer" class="view active">
        
        <div class="stats-box" id="user-stats">
            <h3 style="margin-bottom: 5px;">Your Progress</h3>
            <div id="last-read" style="color: var(--text-muted); font-size: 14px;">Last Read: None</div>
            <div id="total-mistakes" style="color: var(--warning); font-size: 14px; margin-top: 5px;">Total Mistakes Saved: 0</div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-surah" onclick="App.switchTab('surah')">Surahs</button>
            <button class="tab-btn" id="tab-juz" onclick="App.switchTab('juz')">Paras</button>
        </div>
        <input type="text" id="search-input" class="search-box" placeholder="Search Surah (e.g., Yaseen)..." onkeyup="App.filterList()">
        <div id="loading-indicator" style="text-align:center; color: var(--primary);">Fetching Quran Data... ⏳</div>
        <div id="quran-list"></div>
    </div>

    <div id="view-recitation" class="view">
        <h2 id="recitation-title" style="text-align: center; margin-bottom: 10px;">Loading...</h2>
        
        <div class="quran-board" id="quran-board"></div>

        <div class="status-box">
            <strong id="mic-status">Microphone Idle</strong>
            <div id="live-text" style="color: var(--warning); font-style: italic; margin-top: 5px;">Waiting for voice...</div>
        </div>

        <div class="controls">
            <button id="btn-start" class="btn btn-primary" onclick="App.startMic()">🎤 Start Reciting</button>
            <button id="btn-stop" class="btn btn-danger" style="display: none;" onclick="App.stopMic()">🛑 Stop Reciting</button>
            <button class="btn btn-secondary" onclick="App.goBack()">🔙 Save & Back</button>
        </div>
    </div>
</div>

<script>
    // --- LOCAL DATABASE LAYER ---
    const DB = {
        saveProgress: (surahName) => localStorage.setItem('hifz_last_read', surahName),
        getProgress: () => localStorage.getItem('hifz_last_read') || 'None',
        logMistake: (surah, word) => {
            let mistakes = JSON.parse(localStorage.getItem('hifz_mistakes') || '[]');
            mistakes.push({ surah, word, time: new Date().toLocaleString() });
            localStorage.setItem('hifz_mistakes', JSON.stringify(mistakes));
        },
        getMistakesCount: () => JSON.parse(localStorage.getItem('hifz_mistakes') || '[]').length
    };

    const App = {
        surahsData: [], currentSurahName: "", targetWords: [], currentWordIndex: 0,
        recognition: null, isUserStopped: true, // Flag to check if user clicked stop

        init: async () => {
            App.updateStatsUI();
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                App.surahsData = data.data;
                document.getElementById('loading-indicator').style.display = 'none';
                App.renderList(App.surahsData);
                App.setupSpeechEngine();
            } catch (e) {
                document.getElementById('loading-indicator').innerText = "Network Error!";
            }
        },

        updateStatsUI: () => {
            document.getElementById('last-read').innerText = `Last Read: ${DB.getProgress()}`;
            document.getElementById('total-mistakes').innerText = `Total Mistakes Tracked: ${DB.getMistakesCount()}`;
        },

        switchTab: (mode) => {
            if(mode === 'juz') alert("Para/Juz API requires pagination. Showing Surahs for now!");
        },

        renderList: (data, filterQuery = "") => {
            const container = document.getElementById('quran-list');
            container.innerHTML = "";
            data.forEach(item => {
                if(item.englishName.toLowerCase().includes(filterQuery.toLowerCase())) {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<div><strong>${item.number}. ${item.englishName}</strong><br><small>${item.numberOfAyahs} Ayahs</small></div><div class="arabic-name">${item.name}</div>`;
                    div.onclick = () => App.openSurah(item.number, item.englishName);
                    container.appendChild(div);
                }
            });
        },

        filterList: () => App.renderList(App.surahsData, document.getElementById('search-input').value),

        openSurah: async (number, name) => {
            document.getElementById('view-explorer').classList.remove('active');
            document.getElementById('view-recitation').classList.add('active');
            document.getElementById('recitation-title').innerText = `Loading ${name}...`;
            
            DB.saveProgress(name);
            App.currentSurahName = name;

            const res = await fetch(`https://api.alquran.cloud/v1/surah/${number}`);
            const data = await res.json();
            
            App.targetWords = []; App.currentWordIndex = 0;
            const board = document.getElementById('quran-board');
            board.innerHTML = "";

            let wIndex = 0;
            data.data.ayahs.forEach(ayah => {
                ayah.text.split(' ').forEach(w => {
                    App.targetWords.push(w);
                    board.innerHTML += `<span class='word' id='w-${wIndex}'>${w}</span> `;
                    wIndex++;
                });
                board.innerHTML += `<span style="color:var(--primary);">(${ayah.numberInSurah})</span> `;
            });

            document.getElementById('recitation-title').innerText = name;
            App.highlightWord();
        },

        highlightWord: () => {
            document.querySelectorAll('.word').forEach(el => el.classList.remove('highlight'));
            const el = document.getElementById(`w-${App.currentWordIndex}`);
            if(el) {
                el.classList.add('highlight');
                el.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        },

        goBack: () => {
            App.stopMic();
            document.getElementById('view-recitation').classList.remove('active');
            document.getElementById('view-explorer').classList.add('active');
            App.updateStatsUI();
        },

        // --- AUDIO CORRECTION (TTS) ---
        speakCorrection: (arabicWord) => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(arabicWord);
                utterance.lang = 'ar-SA'; // Speaks in Arabic accent
                utterance.rate = 0.8; // Speaks slightly slow so user understands
                window.speechSynthesis.speak(utterance);
            }
        },

        // --- SPEECH RECOGNITION (WITH AUTO-RESTART LOOP) ---
        setupSpeechEngine: () => {
            const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechAPI) return;
            
            App.recognition = new SpeechAPI();
            App.recognition.continuous = true;
            App.recognition.interimResults = true;
            App.recognition.lang = 'ar-SA';

            App.recognition.onstart = () => {
                document.getElementById('mic-status').innerText = "🎙️ Listening... (Speak now)";
                document.getElementById('mic-status').style.color = "var(--primary)";
                document.getElementById('btn-start').style.display = "none";
                document.getElementById('btn-stop').style.display = "block";
            };

            App.recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('live-text').innerText = transcript;
                App.processLogic(transcript.trim());
            };

            // THE HACK: Auto-restart mic if user pauses
            App.recognition.onend = () => {
                if(!App.isUserStopped) {
                    document.getElementById('mic-status').innerText = "Restarting mic...";
                    try { App.recognition.start(); } catch(e) {}
                } else {
                    document.getElementById('mic-status').innerText = "Microphone Stopped";
                    document.getElementById('mic-status').style.color = "var(--text-muted)";
                    document.getElementById('btn-start').style.display = "block";
                    document.getElementById('btn-stop').style.display = "none";
                }
            };
        },

        startMic: () => { App.isUserStopped = false; App.recognition.start(); },
        stopMic: () => { App.isUserStopped = true; if(App.recognition) App.recognition.stop(); },

        processLogic: (speech) => {
            if(App.currentWordIndex >= App.targetWords.length) return;

            const spokenWords = speech.split(/\s+/);
            const lastWord = spokenWords[spokenWords.length - 1];
            const targetWord = App.targetWords[App.currentWordIndex];
            const el = document.getElementById(`w-${App.currentWordIndex}`);

            if(lastWord.length > 1) {
                // Check if correct
                if(targetWord.includes(lastWord) || lastWord.includes(targetWord)) {
                    el.classList.remove('wrong');
                    el.classList.add('correct');
                    App.currentWordIndex++;
                    App.highlightWord();
                } 
                // ERROR DETECTION & AUDIO CORRECTION
                else {
                    el.classList.add('wrong');
                    DB.logMistake(App.currentSurahName, targetWord);
                    document.getElementById('live-text').innerText = `❌ Error! Correct word is: ${targetWord}`;
                    
                    // Stop Mic temporarily -> Speak correct word -> Restart Mic
                    App.stopMic();
                    App.speakCorrection(targetWord);
                    setTimeout(() => { if(document.getElementById('view-recitation').classList.contains('active')) App.startMic(); }, 2000);
                }
            }
        }
    };

    window.onload = App.init;
</script>
</body>
</html>
